<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ターゲット1900 フラッシュカード</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f5;
    --bg3: #ebebeb;
    --text: #1a1a1a;
    --text2: #666666;
    --border: #dddddd;
    --blue: #2563eb;
    --blue-bg: #eff6ff;
    --blue-text: #1d4ed8;
    --radius: 12px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg2: #242424;
      --bg3: #2e2e2e;
      --text: #f0f0f0;
      --text2: #aaaaaa;
      --border: #3a3a3a;
      --blue: #3b82f6;
      --blue-bg: #1e3a5f;
      --blue-text: #93c5fd;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }
  .header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header .range-badge {
    font-size: 12px;
    background: var(--blue-bg);
    color: var(--blue-text);
    padding: 3px 10px;
    border-radius: 20px;
  }
  .nav {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .nav button {
    flex: 1;
    padding: 12px 4px;
    border: none;
    background: none;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    font-family: inherit;
  }
  .nav button.active {
    color: var(--blue);
    border-bottom-color: var(--blue);
    background: var(--bg);
  }
  .container { padding: 16px; max-width: 600px; margin: 0 auto; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
  .stat { background: var(--bg2); border-radius: var(--radius-sm); padding: 10px 6px; text-align: center; }
  .stat .n { font-size: 22px; font-weight: 600; }
  .stat .l { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* Progress */
  .prog-wrap { height: 5px; background: var(--bg3); border-radius: 3px; margin-bottom: 14px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width 0.3s; }

  /* Card */
  .card-scene { perspective: 1200px; margin-bottom: 12px; }
  .card-inner {
    position: relative;
    height: 200px;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer;
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .card-face.back { transform: rotateY(180deg); }
  .card-no { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .card-part { font-size: 12px; padding: 2px 10px; border-radius: 20px; background: var(--bg2); color: var(--text2); margin-bottom: 10px; }
  .card-word { font-size: 32px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .card-meaning { font-size: 18px; font-weight: 500; text-align: center; line-height: 1.6; color: var(--text); margin-bottom: 4px; }
  .card-hint { font-size: 12px; color: var(--text2); margin-top: 12px; }

  /* Grade buttons */
  .grade-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
  .gb {
    padding: 10px 4px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--bg);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    font-family: inherit;
    color: var(--text);
    transition: background 0.12s;
  }
  .gb:active { transform: scale(0.97); }
  .gb .sub { font-size: 10px; font-weight: 400; display: block; margin-top: 2px; color: var(--text2); }
  .gb.again { color: #b91c1c; border-color: #fca5a5; }
  .gb.hard  { color: #92400e; border-color: #fcd34d; }
  .gb.good  { color: #1e40af; border-color: #93c5fd; }
  .gb.easy  { color: #166534; border-color: #86efac; }

  /* Done screen */
  .done { text-align: center; padding: 40px 16px; }
  .done .trophy { font-size: 48px; display: block; margin-bottom: 12px; }
  .done h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .done p { color: var(--text2); font-size: 14px; margin-bottom: 20px; }
  .btn { padding: 10px 22px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; cursor: pointer; font-family: inherit; margin[...]
  .btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }

  /* Range view */
  .range-card { background: var(--bg2); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .range-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .range-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .range-row input {
    width: 76px; padding: 8px 10px;
    border-radius: var(--radius-sm); border: 1px solid var(--border);
    font-size: 15px; background: var(--bg); color: var(--text);
    font-family: inherit;
  }
  .range-row span { font-size: 14px; color: var(--text2); }
  .quick-btns { display: flex; flex-wrap: wrap; gap: 6px; }
  .qb {
    padding: 6px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg);
    font-size: 12px; cursor: pointer; color: var(--text2); font-family: inherit;
  }
  .qb:hover { background: var(--bg3); }
  .range-note { font-size: 12px; color: var(--text2); }

  /* List view */
  .list-search {
    width: 100%; padding: 10px 14px;
    border-radius: var(--radius-sm); border: 1px solid var(--border);
    font-size: 15px; margin-bottom: 10px;
    background: var(--bg); color: var(--text); font-family: inherit;
  }
  .list-items { display: flex; flex-direction: column; gap: 4px; }
  .li {
    display: flex; align-items: center;
    padding: 10px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--bg); gap: 8px;
  }
  .li-no { font-size: 11px; color: var(--text2); min-width: 34px; }
  .li-w { font-size: 14px; font-weight: 600; min-width: 120px; }
  .li-m { font-size: 12px; color: var(--text2); flex: 1; }
  .li-due { font-size: 11px; padding: 2px 8px; border-radius: 12px; white-space: nowrap; }
  .d-new    { background: #dcfce7; color: #166534; }
  .d-today  { background: #fee2e2; color: #b91c1c; }
  .d-future { background: var(--bg2); color: var(--text2); }
  .list-more { font-size: 12px; color: var(--text2); text-align: center; padding: 10px; }
</style>
</head>
<body>

<div class="header">
  <h1>📖 ターゲット1900</h1>
  <span class="range-badge" id="range-badge">全1900語</span>
</div>

<nav class="nav">
  <button class="active" onclick="switchView('study')" id="btn-study">📚 学習</button>
  <button onclick="switchView('range')" id="btn-range">⚙️ 範囲</button>
  <button onclick="switchView('list')" id="btn-list">📋 一覧</button>
</nav>

<!-- 学習ビュー -->
<div id="study-view" class="container">
  <div class="stats">
    <div class="stat"><div class="n" id="s-due">0</div><div class="l">今日の予定</div></div>
    <div class="stat"><div class="n" id="s-done">0</div><div class="l">完了</div></div>
    <div class="stat"><div class="n" id="s-new">0</div><div class="l">未学習</div></div>
    <div class="stat"><div class="n" id="s-total">0</div><div class="l">範囲内</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>

  <div id="card-area">
    <div class="card-scene" onclick="flipCard()">
      <div class="card-inner" id="card-inner">
        <div class="card-face front">
          <span class="card-no" id="c-no"></span>
          <span class="card-part" id="c-part"></span>
          <div class="card-word" id="c-word"></div>
          <div class="card-hint">👆 タップして答えを確認</div>
        </div>
        <div class="card-face back">
          <span class="card-no" id="c-no-b"></span>
          <span class="card-part" id="c-part-b"></span>
          <div class="card-word" id="c-word-b" style="font-size:22px;margin-bottom:8px"></div>
          <div class="card-meaning" id="c-mean"></div>
        </div>
      </div>
    </div>
    <div class="grade-row" id="grade-row" style="display:none">
      <button class="gb again" onclick="grade(0)">もう一度<span class="sub">すぐ</span></button>
      <button class="gb hard"  onclick="grade(1)">難しい<span class="sub" id="g-hard"></span></button>
      <button class="gb good"  onclick="grade(2)">良い<span class="sub" id="g-good"></span></button>
      <button class="gb easy"  onclick="grade(3)">簡単<span class="sub" id="g-easy"></span></button>
    </div>
  </div>

  <div id="done-screen" class="done" style="display:none">
    <span class="trophy">🏆</span>
    <h2>セッション完了！</h2>
    <p id="done-msg"></p>
    <button class="btn" onclick="resetSession()">もう一度</button>
    <button class="btn" onclick="switchView('list')">単語一覧</button>
  </div>
</div>

<!-- 範囲設定ビュー -->
<div id="range-view" class="container" style="display:none">
  <div class="range-card">
    <div class="range-title">⚙️ 学習範囲を設定</div>
    <div class="range-row">
      <input type="number" id="r-from" min="1" max="1900" value="1">
      <span>〜</span>
      <input type="number" id="r-to" min="1" max="1900" value="100">
      <span>番</span>
      <button class="btn primary" onclick="applyRange()">適用</button>
    </div>
    <div class="quick-btns">
      <button class="qb" onclick="setRange(1,100)">1〜100</button>
      <button class="qb" onclick="setRange(1,200)">1〜200</button>
      <button class="qb" onclick="setRange(1,300)">1〜300</button>
      <button class="qb" onclick="setRange(1,500)">1〜500</button>
      <button class="qb" onclick="setRange(301,600)">301〜600</button>
      <button class="qb" onclick="setRange(601,900)">601〜900</button>
      <button class="qb" onclick="setRange(901,1200)">901〜1200</button>
      <button class="qb" onclick="setRange(1201,1500)">1201〜1500</button>
      <button class="qb" onclick="setRange(1501,1900)">1501〜1900</button>
      <button class="qb" onclick="setRange(1,1900)">全範囲</button>
    </div>
  </div>
  <p class="range-note">※ 範囲を変更すると学習キューがリセットされます。復習スケジュールはこのブラウザ上に保存されます。</p>
</div>

<!-- 単語一覧ビュー -->
<div id="list-view" class="container" style="display:none">
  <input class="list-search" type="text" placeholder="単語・意味で検索..." oninput="renderList(this.value)" id="list-input">
  <div class="list-items" id="list-cont"></div>
</div>

<script>
const WORDS = [
[1,"create","動詞","を創り出す；を引き起こす"],[2,"increase","動詞","増加する；を増やす"],[3,"improve","動詞","を向上させる；よくなる"],[4,"mean","動詞","を意[...]
];

const KEY = 't1900_web_v1';
const NOW = Date.now();
let rangeFrom = 1, rangeTo = 1900;
let queue = [], curIdx = 0, doneCount = 0, isFlipped = false;

function loadSRS() { try { return JSON.parse(localStorage.getItem(KEY)||'{}'); } catch(e) { return {}; } }
function saveSRS(d) { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch(e) {} }
let SRS = loadSRS();

function getCard(id) {
  if (!SRS[id]) SRS[id] = { interval:0, rep:0, ef:2.5, due:NOW, isNew:true };
  return SRS[id];
}

function sm2(c, q) {
  let {interval, rep, ef} = c;
  let nef = Math.max(1.3, ef + 0.1 - (3-q)*(0.08+(3-q)*0.02));
  let ni, nr;
  if (q < 2) { nr=0; ni=1; }
  else {
    nr=rep+1;
    if(rep===0) ni=1;
    else if(rep===1) ni=6;
    else ni=Math.round(interval*nef);
    if(q===3) ni=Math.round(ni*1.3);
    if(q===1) ni=Math.max(1,Math.round(ni*0.7));
  }
  return {interval:ni, rep:nr, ef:nef, due:NOW+ni*86400000, isNew:false};
}

function dueToday(id) { return getCard(id).due <= NOW + 3600000; }
function inRange(id)   { return id >= rangeFrom && id <= rangeTo; }
function fmtDue(due)   {
  const d = Math.round((due-NOW)/86400000);
  return d<=0 ? '今日' : d===1 ? '明日' : d+'日後';
}

function initQueue() {
  queue = WORDS.filter(w => inRange(w[0]) && dueToday(w[0]));
  queue.sort(() => Math.random()-0.5);
  curIdx = 0; doneCount = 0;
  updateStats();
}

function updateStats() {
  const due   = WORDS.filter(w => inRange(w[0]) && dueToday(w[0])).length;
  const newW  = WORDS.filter(w => inRange(w[0]) && getCard(w[0]).isNew).length;
  const total = WORDS.filter(w => inRange(w[0])).length;
  document.getElementById('s-due').textContent   = due;
  document.getElementById('s-done').textContent  = doneCount;
  document.getElementById('s-new').textContent   = newW;
  document.getElementById('s-total').textContent = total;
  const pct = queue.length > 0 ? Math.round(doneCount/queue.length*100) : (doneCount>0?100:0);
  document.getElementById('prog').style.width = Math.min(pct,100)+'%';
}

function showCard(w) {
  isFlipped = false;
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('grade-row').style.display = 'none';
  document.getElementById('c-no').textContent     = w[0]+'番';
  document.getElementById('c-part').textContent   = w[2];
  document.getElementById('c-word').textContent   = w[1];
  document.getElementById('c-no-b').textContent   = w[0]+'番';
  document.getElementById('c-part-b').textContent = w[2];
  document.getElementById('c-word-b').textContent = w[1];
  document.getElementById('c-mean').textContent   = w[3];
  document.getElementById('g-hard').textContent   = '2〜3日後';
  document.getElementById('g-good').textContent   = '7日後';
  document.getElementById('g-easy').textContent   = '14日後';
}

function flipCard() {
  if (isFlipped) return;
  isFlipped = true;
  document.getElementById('card-inner').classList.add('flipped');
  setTimeout(() => {
    document.getElementById('grade-row').style.display = 'grid';
  }, 225);
}

function grade(q) {
  if (!isFlipped) return;
  const w = queue[curIdx];
  SRS[w[0]] = sm2(getCard(w[0]), q);
  saveSRS(SRS);
  doneCount++; curIdx++;
  updateStats();
  if (curIdx >= queue.length) {
    document.getElementById('card-area').style.display = 'none';
    document.getElementById('done-screen').style.display = 'block';
    document.getElementById('done-msg').textContent = doneCount + '枚完了！復習スケジュールは自動保存されました。';
  } else {
    showCard(queue[curIdx]);
  }
}

function resetSession() {
  document.getElementById('done-screen').style.display = 'none';
  document.getElementById('card-area').style.display = 'block';
  initQueue();
  if (queue.length === 0) {
    document.getElementById('card-area').style.display = 'none';
    document.getElementById('done-screen').style.display = 'block';
    document.getElementById('done-msg').textContent = '今日の復習はすべて完了しています！';
  } else {
    showCard(queue[0]);
  }
}

function applyRange() {
  let f = parseInt(document.getElementById('r-from').value)||1;
  let t = parseInt(document.getElementById('r-to').value)||1900;
  if (f<1) f=1; if (t>1900) t=1900; if (f>t){let tmp=f;f=t;t=tmp;}
  rangeFrom=f; rangeTo=t;
  document.getElementById('range-badge').textContent = f+'〜'+t+'番';
  switchView('study');
  resetSession();
}

function setRange(f,t) {
  document.getElementById('r-from').value = f;
  document.getElementById('r-to').value = t;
  applyRange();
}

function switchView(v) {
  ['study','range','list'].forEach(n => {
    document.getElementById(n+'-view').style.display = v===n ? 'block' : 'none';
    document.getElementById('btn-'+n).classList.toggle('active', v===n);
  });
  if (v === 'list') renderList('');
}

function renderList(q) {
  const cont = document.getElementById('list-cont');
  cont.innerHTML = '';
  const words = WORDS.filter(w => inRange(w[0]) && (!q || w[1].toLowerCase().includes(q.toLowerCase()) || w[3].includes(q)));
  words.slice(0, 300).forEach(w => {
    const c  = getCard(w[0]);
    const dc = c.isNew ? 'd-new' : (dueToday(w[0]) ? 'd-today' : 'd-future');
    const dl = c.isNew ? '新規'  : (dueToday(w[0]) ? '今日'    : fmtDue(c.due));
    const el = document.createElement('div');
    el.className = 'li';
    el.innerHTML = `<span class="li-no">${w[0]}</span><span class="li-w">${w[1]}</span><span class="li-m">${w[3]}</span><span class="li-due ${dc}">${dl}</span>`;
    cont.appendChild(el);
  });
  if (words.length > 300) {
    const p = document.createElement('p');
    p.className = 'list-more';
    p.textContent = `検索して絞り込んでください（${words.length}件中300件表示）`;
    cont.appendChild(p);
  }
}

// 起動
initQueue();
if (queue.length === 0) {
  document.getElementById('card-area').style.display = 'none';
  document.getElementById('done-screen').style.display = 'block';
  document.getElementById('done-msg').textContent = '今日の復習はすべて完了しています！範囲設定から新しい単語を追加してみましょう。';
} else {
  showCard(queue[0]);
}
</script>
</body>
</html>
